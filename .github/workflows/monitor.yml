name: PH hazard monitor

# Runs in GitHub's cloud — no dependency on any local machine or the Claude app.
on:
  schedule:
    # NOTE: GitHub cron is best-effort — it throttles/drops runs, worst at the top of
    # the hour (:00). So we run OFF-PEAK and twice an hour to improve the odds of firing.
    # 04:12/04:42 UTC = 12:12/12:42 NN Manila → the first afternoon run creates the daily brief.
    - cron: "12,42 * * * *"
  workflow_dispatch:           # lets you (or an external scheduler) run it on demand
    inputs:
      force_daily_brief:
        description: "Generate today's daily brief now, even before noon"
        type: boolean
        default: false

permissions:
  contents: write              # allows the job to commit the updated feed back to the repo

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run hazard scan
        run: node scan.mjs
        env:
          # Only a human ticking "force_daily_brief" forces the brief; scheduled and
          # ordinary external triggers leave this at 0 so the brief stays noon-based.
          FORCE_DIGEST: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_daily_brief) && '1' || '0' }}
      - name: Commit updated feed (only if changed)
        run: |
          git config user.name "mySMB hazard monitor"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.json feed-data.js
          if git diff --staged --quiet; then
            echo "No feed changes this run."
            exit 0
          fi
          git commit -m "feed update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Integrate any newer commits on the branch before pushing (handles re-runs
          # of older runs and concurrent updates). The freshly generated feed wins.
          for attempt in 1 2 3; do
            if git pull --rebase -X ours origin "${GITHUB_REF_NAME}" \
               && git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Pushed."
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying in 3s..."
            sleep 3
          done
          echo "Push failed after retries."
          exit 1
